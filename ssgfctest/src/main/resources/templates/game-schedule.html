<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <meta charset="UTF-8">
    <title>📅 SSG 경기일정</title>

    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">
</head>
<body>

<!-- 🧩 콘텐츠 영역 -->
<section class="container mt-5" layout:fragment="content">
    <h2 class="text-center mb-4">📅 SSG 랜더스 경기 일정</h2>
    <div id="calendar"></div>
</section>

<!-- ✅ 스크립트 fragment: 실제로 렌더링되게 분리 -->
<th:block layout:fragment="script">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                height: 'auto',
                events: function (fetchInfo, successCallback, failureCallback) {
                    axios.get('/games')
                        .then(response => {
                            const events = response.data.map(game => ({
                                title: `${game.team1} ${game.score1 ?? ''} vs ${game.team2} ${game.score2 ?? ''}`,
                                start: game.gameDate,
                                allDay: true
                            }));
                            successCallback(events);
                        })
                        .catch(error => {
                            console.error("일정 로딩 실패", error);
                            failureCallback(error);
                        });
                }
            });
            calendar.render();
        });
    </script>
</th:block>

</body>
</html>
