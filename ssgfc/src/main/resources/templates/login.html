<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>로그인 - SSG 랜더스 커뮤니티</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    .wrapper {
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    .content {
      flex: 1;
    }

    footer {
      background-color: #343a40;
      color: white;
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- 헤더 -->
    <div th:replace="fragments/header :: header"></div>

    <!-- 로그인 폼 -->
    <div class="container content my-5" style="max-width: 500px;">
      <h2 class="text-center mb-4">로그인</h2>
      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label for="email" class="form-label">이메일</label>
          <input type="email" class="form-control" id="email" name="username" placeholder="example@ssg.com" required>
        </div>
        <div class="mb-3">
          <label for="pwd" class="form-label">비밀번호</label>
          <input type="password" class="form-control" id="pwd" name="password" placeholder="비밀번호 입력" required>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary">로그인</button>
          <a th:href="@{/signup}" class="btn btn-secondary">회원가입</a>
        </div>
      </form>
    </div>

    <!-- 푸터 -->
    <div th:replace="fragments/footer :: footer"></div>

  </div>
</body>
</html>
